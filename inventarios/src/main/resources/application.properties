spring.application.name=inventarios
#Conexion a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/inventaio_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.drive-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Configuracion el patron del lol
logging.pattern.console=[%thread] %-5level: %logger - %msg%n
#Configurar el nivel del log
loggin.level.root=INFO
#Cambiar el puerto de tomcat
#server.port=8080
spring.main.banner-mode=off